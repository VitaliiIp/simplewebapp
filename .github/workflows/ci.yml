name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  html-validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install html-validate
        run: npm install --no-save html-validate@8
      - name: Validate
        run: npx html-validate "*.html"

  link-check:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --include-fragments "*.html"
          fail: true
